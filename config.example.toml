# rustcast config — copy to ~/.config/rustcast/config.toml
# Every field is optional; defaults are shown.

[ui]
width = 900
height = 560
animations = true
# theme = "/path/to/custom/style.css"   # else ~/.config/rustcast/style.css, else bundled

[general]
default_tab = "apps"          # apps | clipboard | files | cyber | cheat | extensions
terminal = "kitty -e"         # auto-detected if omitted

[clipboard]
enabled = true
max_entries = 500
max_image_mb = 50

[files]
enabled = true
roots = ["~"]
ignore = [".cache", "node_modules", ".git", ".cargo", "target"]

[cyber]
default_target = ""           # e.g. "10.0.0.5:4444" — reused by payloads/templates

# ── Quicklinks ──────────────────────────────────────────────
# Trigger by name from the Apps tab; {query} is the text after the name.
# kind = "url" (default, opens in browser) or "shell".

[[quicklinks]]
name = "gh"
template = "https://github.com/search?q={query}"

[[quicklinks]]
name = "shodan"
template = "https://www.shodan.io/search?query={query}"

[[quicklinks]]
name = "cve"
template = "https://nvd.nist.gov/vuln/detail/{query}"

[[quicklinks]]
name = "g"
template = "https://www.google.com/search?q={query}"

[[quicklinks]]
name = "grep"
kind = "shell"
template = "rg {query} ~"

# ── Snippets (Phase 5) ──────────────────────────────────────
# [[snippets]]
# keyword = "sig"
# name = "Email signature"
# text = "Best,\nzer0bav"

# ── Cheatsheets ─────────────────────────────────────────────
# The Cheats tab bundles curated references (nmap, tmux, vim, curl, gdb,
# hashcat, sqlmap, linux-privesc…). Drop your own Markdown/text files into
# ~/.config/rustcast/cheatsheets/ and they show up automatically — the file
# name becomes the title. No config needed.

# ── Command modes (no config) ───────────────────────────────
# Pick one from the root list and press Enter to drop into an isolated view;
# typing then just filters within it, and Esc backs out.
#   Kill Process     terminate processes (Enter = SIGTERM, Ctrl+K = SIGKILL)
#   Window Switcher  switch open windows (Hyprland / Sway) — also the Windows tab
#   Port Inspector   show/kill what is listening on a port (needs ss or lsof)
#   Generate Secret  passwords, hex/base64 tokens, UUIDs, PINs
